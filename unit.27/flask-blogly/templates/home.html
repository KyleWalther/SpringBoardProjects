<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Users</title>
</head>
<body>

    <h1>All Users</h1>
    <ul>
        {% for user in users %}
        <li><a href="/user/{{ user.id }}">{{ user.first_name }} {{ user.last_name }}</a></li>
        {% endfor %}
    </ul>

    <a href="/add"><button>Add New User</button></a>

</body>
</html>
